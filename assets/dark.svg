<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    
    <!-- Glowing Ambient Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur"/>
    </filter>
    <filter id="pill-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Shimmer & Gradients -->
    <linearGradient id="ascii-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    
    <linearGradient id="border-shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.15)"/>
    </linearGradient>

    <style>
      .text-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 700; fill: #F8FAFC; }
      .text-sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 500; fill: #94A3B8; font-size: 15px; }
      .text-code { font-family: 'JetBrains Mono', 'Fira Code', monospace; fill: #38BDF8; font-size: 14px; }
      .pill-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 600; fill: #E2E8F0; font-size: 13px; }
      .pill-bg { fill: rgba(30, 41, 59, 0.8); stroke: rgba(255,255,255,0.1); stroke-width: 1; transition: all 0.3s ease; }
      .pill:hover .pill-bg { fill: rgba(56, 189, 248, 0.2); stroke: #38BDF8; }
    </style>
  </defs>

  <!-- Canvas Background -->
  <rect width="1180" height="610" rx="24" fill="#030712"/>
  
  <!-- Animated Background Orbs (Glassmorphism ambient glow) -->
  <circle cx="200" cy="150" r="160" fill="#7C3AED" opacity="0.25" filter="url(#glow)">
    <animate attributeName="cx" values="200;250;150;200" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;200;100;150" dur="15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="450" r="180" fill="#06B6D4" opacity="0.2" filter="url(#glow)">
    <animate attributeName="cx" values="900;850;950;900" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="450;400;500;450" dur="18s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="250" r="140" fill="#10B981" opacity="0.15" filter="url(#glow)">
    <animate attributeName="r" values="140;180;140" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle Overlay Grid -->
  <rect width="1180" height="610" rx="24" fill="url(#grid)"/>

  <!-- ==================== LEFT CARD (38%: ASCII / AI CORE) ==================== -->
  <g transform="translate(30, 30)">
    <!-- Glass Panel Background -->
    <rect width="430" height="550" rx="20" fill="rgba(15, 23, 42, 0.7)" stroke="url(#border-shimmer)" stroke-width="1"/>
    
    <!-- Animated Scanline Sweep -->
    <rect x="0" y="0" width="430" height="6" fill="url(#accent-grad)" opacity="0.4" clip-path="url(#left-clip)">
      <animate attributeName="y" values="0;544;0" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Floating Cyber / Neural ASCII Art -->
    <g transform="translate(25, 40)" fill="url(#ascii-grad)" font-family="monospace" font-size="13" font-weight="bold" letter-spacing="1">
      <animateTransform attributeName="transform" type="translate" values="25,40; 25,34; 25,40" dur="5s" repeatCount="indefinite"/>
      <text x="0" y="20">  ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲  </text>
      <text x="0" y="45">  ███ ▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄ ███  </text>
      <text x="0" y="70">  ███ ████████████████████████ ███  </text>
      <text x="0" y="95">  ███ ███  [ AI / ML CORE ]  ███ ███  </text>
      <text x="0" y="120">  ███ ████████████████████████ ███  </text>
      <text x="0" y="145">  ███ ▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀ ███  </text>
      <text x="0" y="170">  ▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼  </text>
      <text x="0" y="210">        O -------- O -------- O     </text>
      <text x="0" y="235">        | \      / | \      / |     </text>
      <text x="0" y="260">        |   \  /   |   \  /   |     </text>
      <text x="0" y="285">        O --- O --- O --- O --- O     </text>
      <text x="0" y="310">        |   /  \   |   /  \   |     </text>
      <text x="0" y="335">        | /      \ | /      \ |     </text>
      <text x="0" y="360">        O -------- O -------- O     </text>
      <text x="0" y="410" fill="#38BDF8">  &gt;&gt;&gt; SYSTEM: ONLINE</text>
      <text x="0" y="440" fill="#94A3B8">  &gt;&gt;&gt; FOCUS:  COMPUTER VISION</text>
      <text x="0" y="470" fill="#10B981">  &gt;&gt;&gt; MODEL:  PREDICTIVE AI</text>
      
      <!-- Blinking Terminal Cursor -->
      <rect x="220" y="398" width="10" height="15" fill="#38BDF8">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ==================== RIGHT CARD (62%: TERMINAL & BIO) ==================== -->
  <g transform="translate(480, 30)">
    <!-- Glass Panel Background -->
    <rect width="670" height="550" rx="20" fill="rgba(15, 23, 42, 0.7)" stroke="url(#border-shimmer)" stroke-width="1"/>
    
    <!-- macOS Window Controls -->
    <circle cx="30" cy="30" r="6" fill="#EF4444"/>
    <circle cx="50" cy="30" r="6" fill="#F59E0B"/>
    <circle cx="70" cy="30" r="6" fill="#10B981"/>
    <text x="95" y="34" class="text-sub" font-size="13">helihathi</text>
    <line x1="0" y1="55" x2="670" y2="55" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Greeting & Name -->
    <text x="40" y="110" class="text-sub" font-size="20">Hi there, I'm</text>
    <text x="40" y="160" class="text-main" font-size="44" letter-spacing="-0.5">Heli Hathi</text>

    <!-- Animated Typing Role Subtitle (Sequential SMIL Fade) -->
    <g transform="translate(40, 195)">
      <text x="0" y="0" class="text-code" font-size="18" fill="#38BDF8">
        &gt; M.Tech Data Science Student
        <animate attributeName="opacity" values="1;1;0;0;0;0;1" dur="9s" repeatCount="indefinite"/>
      </text>
      <text x="0" y="0" class="text-code" font-size="18" fill="#A78BFA" opacity="0">
        &gt; Computer Vision &amp; Deep Learning Researcher
        <animate attributeName="opacity" values="0;0;1;1;0;0;0" dur="9s" repeatCount="indefinite"/>
      </text>
      <text x="0" y="0" class="text-code" font-size="18" fill="#34D399" opacity="0">
        &gt; AI Predictive Analytics &amp; ML Modeller
        <animate attributeName="opacity" values="0;0;0;0;1;1;0" dur="9s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Sequential Bio Items -->
    <g transform="translate(40, 245)" class="text-sub">
      <text x="0" y="0">📍  <tspan fill="#F8FAFC">Location:</tspan> Ahmedabad, India / Remote Available</text>
      <text x="0" y="32">🎓  <tspan fill="#F8FAFC">Education:</tspan> M.Tech in Data Science</text>
      <text x="0" y="64">💡  <tspan fill="#F8FAFC">Current Focus:</tspan> Portfolio Optimization using Machine Learning</text>
      <text x="0" y="96">🚀  <tspan fill="#F8FAFC">Status:</tspan> Actively seeking AI/ML &amp; Data Science Internships</text>
    </g>

    <!-- Glowing Tech Stack Pills (With Hover Scale & Pulsing Glow) -->
    <g transform="translate(40, 425)">
      <text x="0" y="-15" class="text-sub" font-size="13" letter-spacing="1">TECHNICAL ARSENAL</text>
      
      <!-- Row 1 -->
      <g class="pill" transform="translate(0, 0)">
        <rect width="85" height="32" rx="16" class="pill-bg"/><text x="21" y="21" class="pill-text">Python</text>
      </g>
      <g class="pill" transform="translate(95, 0)">
        <rect width="85" height="32" rx="16" class="pill-bg"/><text x="18" y="21" class="pill-text">PyTorch</text>
      </g>
      <g class="pill" transform="translate(190, 0)">
        <rect width="105" height="32" rx="16" class="pill-bg"/><text x="15" y="21" class="pill-text">TensorFlow</text>
      </g>
      <g class="pill" transform="translate(305, 0)">
        <rect width="85" height="32" rx="16" class="pill-bg"/><text x="16" y="21" class="pill-text">OpenCV</text>
      </g>
      <g class="pill" transform="translate(400, 0)">
        <rect width="110" height="32" rx="16" class="pill-bg"/><text x="17" y="21" class="pill-text">Scikit-Learn</text>
      </g>
      <g class="pill" transform="translate(520, 0)">
        <rect width="70" height="32" rx="16" class="pill-bg"/><text x="18" y="21" class="pill-text">AWS</text>
      </g>
      
      <!-- Row 2 -->
      <g class="pill" transform="translate(0, 42)">
        <rect width="85" height="32" rx="16" class="pill-bg"/><text x="20" y="21" class="pill-text">Docker</text>
      </g>
      <g class="pill" transform="translate(95, 42)">
        <rect width="85" height="32" rx="16" class="pill-bg"/><text x="20" y="21" class="pill-text">MySQL</text>
      </g>
      <g class="pill" transform="translate(190, 42)">
        <rect width="85" height="32" rx="16" class="pill-bg"/><text x="18" y="21" class="pill-text">Jupyter</text>
      </g>
      <g class="pill" transform="translate(285, 42)">
        <rect width="85" height="32" rx="16" class="pill-bg"/><text x="20" y="21" class="pill-text">Pandas</text>
      </g>
      <g class="pill" transform="translate(380, 42)">
        <rect width="85" height="32" rx="16" class="pill-bg"/><text x="22" y="21" class="pill-text">NumPy</text>
      </g>
    </g>
  </g>
</svg>
